version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finsage-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - JWT_SECRET=${JWT_SECRET:-finsage-demo-key-change-in-production}
      - FRONTEND_URL=http://localhost:3000
      - REDIS_URL=${REDIS_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - finsage-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: finsage-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - finsage-network

networks:
  finsage-network:
    driver: bridge
